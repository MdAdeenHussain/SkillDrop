<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkillDrop{% endblock %}</title>
    <meta name="description" content="Micro-learning platform for blue-collar workers with 60-second skill lessons and AI support.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a href="{{ url_for('home') }}" class="brand">
                <span class="brand-badge">S</span>
                <span>
                    <strong>SkillDrop</strong>
                    <small>Micro-learning for work</small>
                </span>
            </a>

            <nav class="topnav">
                <a href="{{ url_for('home') }}#categories">Categories</a>
                <a href="{{ url_for('home') }}#chatbot">Ask AI</a>
                <a href="{{ url_for('home') }}#progress">Progress</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="footer">
            <p>Built for fast, practical learning on the move.</p>
            <p>&copy; {{ current_year }} SkillDrop MVP</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
